name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform var-file environment (dev or prod)"
        type: choice
        options:
          - dev
          - prod
        default: dev
      confirm_apply:
        description: 'Type "apply" to run terraform apply (manual runs only)'
        required: true
        type: string

permissions:
  contents: read

# Cancel superseded PR runs; do not cancel in-progress applies on main.
concurrency:
  group: terraform-infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_IN_AUTOMATION: "true"

jobs:
  workflow-dispatch-guard:
    name: Manual apply confirmation
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_apply != 'apply'
    runs-on: ubuntu-latest
    steps:
      - name: Require confirm_apply
        run: |
          echo "workflow_dispatch requires confirm_apply to be exactly: apply"
          exit 1

  terraform-plan:
    name: Terraform plan
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Terraform init (GCS backend)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET repository secret is required for CI Terraform (remote state)."
            exit 1
          fi
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/state/dev"

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan (dev)
        run: terraform plan -input=false -no-color -var-file=environments/dev.tfvars

  terraform-apply-main:
    name: Terraform apply (main → dev)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: terraform-plan
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Terraform init (GCS backend)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET repository secret is required for CI Terraform (remote state)."
            exit 1
          fi
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/state/dev"

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan (dev, saved)
        run: terraform plan -input=false -no-color -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform apply (dev)
        run: terraform apply -input=false -no-color -auto-approve tfplan

  terraform-apply-dispatch:
    name: Terraform apply (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_apply == 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Terraform init (GCS backend)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_PREFIX: ${{ github.event.inputs.environment == 'prod' && 'terraform/state/prod' || 'terraform/state/dev' }}
        run: |
          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET repository secret is required for CI Terraform (remote state)."
            exit 1
          fi
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX}"

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan (saved)
        run: terraform plan -input=false -no-color -var-file=environments/${{ github.event.inputs.environment }}.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -no-color -auto-approve tfplan
